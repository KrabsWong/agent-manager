<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading - Yes Sessions</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        /* 默认黑白配色 - 亮色模式 */
        --splash-bg: #fefcf9;
        --bg-gradient-start: #f8fafc;
        --bg-gradient-mid: #f1f5f9;
        --bg-gradient-end: #e2e8f0;
        --text-color: #1e293b;
        --text-secondary: #475569;
        --accent-primary: #334155;
        --accent-secondary: #475569;
        --accent-tertiary: #64748b;
        --loading-bar-bg: rgba(51, 65, 85, 0.15);
        --glow-color: rgba(100, 116, 139, 0.15);
        --version-color: rgba(100, 116, 139, 0.5);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          /* 默认黑白配色 - 暗色模式 */
          --splash-bg: #000100;
          --bg-gradient-start: #0f172a;
          --bg-gradient-mid: #1e293b;
          --bg-gradient-end: #334155;
          --text-color: #f1f5f9;
          --text-secondary: #cbd5e1;
          --accent-primary: #94a3b8;
          --accent-secondary: #cbd5e1;
          --accent-tertiary: #e2e8f0;
          --loading-bar-bg: rgba(148, 163, 184, 0.2);
          --glow-color: rgba(148, 163, 184, 0.15);
          --version-color: rgba(148, 163, 184, 0.4);
        }
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        background: var(--splash-bg);
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .splash-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
      }

      .logo-wrapper {
        position: relative;
        animation: float 4s ease-in-out infinite;
      }

      .logo {
        width: 200px;
        height: 200px;
        border-radius: 28px;
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.15);
        object-fit: cover;
      }

      .logo-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 240px;
        height: 240px;
        background: radial-gradient(circle, var(--glow-color) 0%, transparent 70%);
        border-radius: 50%;
        z-index: -1;
        animation: pulse 3s ease-in-out infinite;
      }

      .app-title {
        color: var(--text-color);
        font-size: 24px;
        font-weight: 600;
        letter-spacing: 1.5px;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .loading-bar {
        width: 220px;
        height: 4px;
        background: var(--loading-bar-bg);
        border-radius: 2px;
        overflow: hidden;
        margin-top: 8px;
      }

      .loading-progress {
        height: 100%;
        width: 0%;
        background: linear-gradient(
          90deg,
          var(--accent-secondary) 0%,
          var(--accent-primary) 50%,
          var(--accent-tertiary) 100%
        );
        border-radius: 2px;
        animation: loading 2.5s ease-in-out infinite;
        box-shadow: 0 0 12px var(--glow-color);
      }

      .loading-text {
        color: var(--text-secondary);
        font-size: 12px;
        margin-top: 12px;
        letter-spacing: 0.5px;
        animation: fadeInOut 2s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-12px);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.5;
          transform: translate(-50%, -50%) scale(1);
        }
        50% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1.1);
        }
      }

      @keyframes loading {
        0% {
          width: 0%;
          margin-left: 0%;
        }
        50% {
          width: 60%;
          margin-left: 20%;
        }
        100% {
          width: 0%;
          margin-left: 100%;
        }
      }

      @keyframes fadeInOut {
        0%,
        100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }

      .version {
        position: absolute;
        bottom: 24px;
        color: var(--version-color);
        font-size: 11px;
        letter-spacing: 0.5px;
      }
    </style>
  </head>

      // 检测系统暗色模式
      function isDarkMode() {
        return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      }

      function shouldUseDarkLogo(theme) {
        return theme === 'dark' || (theme === 'system' && isDarkMode());
      }

      function updateLogo(theme) {
        const logoEl = document.getElementById('splash-logo');
        if (!logoEl) {
          return;
        }

        const darkLogo = shouldUseDarkLogo(theme);
        document.documentElement.style.setProperty('--splash-bg', darkLogo ? '#000100' : '#fefcf9');
        logoEl.setAttribute(
          'src',
          darkLogo ? 'logo-theme-dark.png' : 'logo-theme-light.png'
        );
      }

      // 应用颜色方案
      function applyColorScheme(colorId, theme) {
        const root = document.documentElement;
        let scheme;

        if (theme === 'dark' || (theme === 'system' && isDarkMode())) {
          scheme = colorSchemes[colorId]?.dark || colorSchemes.default.dark;
        } else {
          scheme = colorSchemes[colorId]?.light || colorSchemes.default.light;
        }

        // 应用所有 CSS 变量
        Object.entries(scheme).forEach(([key, value]) => {
          root.style.setProperty(key, value);
        });
      }

      // 从 URL 参数获取配置
      const urlParams = new URLSearchParams(window.location.search);
      const colorId = urlParams.get('color') || 'default';
      const theme = urlParams.get('theme') || 'system';
      const version = urlParams.get('version') || '4.0.0';

      // 更新版本号显示
      const versionEl = document.getElementById('version');
      if (versionEl) {
        versionEl.textContent = 'v' + version;
      }

      // 应用配色
      applyColorScheme(colorId, theme);
      updateLogo(theme);

      // 监听系统主题变化
      if (theme === 'system') {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
          applyColorScheme(colorId, theme);
          updateLogo(theme);
        });
      }
    </script>
