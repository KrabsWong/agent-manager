name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate SHA256
        id: sha256
        run: |
          ARM64_SHA=$(shasum -a 256 dist/Yes-Sessions-*-arm64.dmg | cut -d' ' -f1)
          X64_SHA=$(shasum -a 256 dist/Yes-Sessions-*-x64.dmg | cut -d' ' -f1)
          echo "arm64=$ARM64_SHA" >> $GITHUB_OUTPUT
          echo "x64=$X64_SHA" >> $GITHUB_OUTPUT
          echo "ARM64 SHA256: $ARM64_SHA"
          echo "X64 SHA256: $X64_SHA"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/Yes-Sessions-*.dmg
            dist/Yes-Sessions-*.exe
            dist/Yes-Sessions-*.AppImage
          body_path: .github/release-template.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Cask
        if: false # 需要先手动创建 Tap 仓库后再启用
        run: |
          # 这里可以添加自动更新 Homebrew Cask 的逻辑
          # 需要你先创建 homebrew-yes-sessions 仓库
          echo "TODO: Update Homebrew Cask with new SHA256 values"
          echo "ARM64: ${{ steps.sha256.outputs.arm64 }}"
          echo "X64: ${{ steps.sha256.outputs.x64 }}"
