name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Resolve tag
        id: resolve-tag
        run: |
          # workflow_dispatch 时使用 input 的 tag，push tag 时使用 GITHUB_REF_NAME
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve-tag.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Verify version consistency
        id: verify-version
        run: |
          # 从 tag 获取版本号（去掉 v 前缀）
          TAG_VERSION=${{ steps.resolve-tag.outputs.tag }}
          TAG_VERSION=${TAG_VERSION#v}

          # 从 package.json 获取版本号
          PKG_VERSION=$(node -p "require('./package.json').version")

          echo "Tag version: $TAG_VERSION"
          echo "Package.json version: $PKG_VERSION"

          # 对比版本号
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "❌ 版本号不一致！"
            echo "   Tag: v$TAG_VERSION"
            echo "   package.json: $PKG_VERSION"
            echo ""
            echo "如果你在使用自动版本管理，请不要手动打 tag。"
            echo "正确流程："
            echo "  1. 创建 PR 到 main 分支"
            echo "  2. 添加标签: major / minor / patch"
            echo "  3. 合并 PR，版本会自动升级"
            echo ""
            echo "如果你确实需要手动修复，请运行:"
            echo "  npm version $TAG_VERSION --no-git-tag-version"
            echo "  git add package.json package-lock.json"
            echo "  git commit -m \"chore(release): bump version to $TAG_VERSION\""
            echo "  git tag -d v$TAG_VERSION && git tag v$TAG_VERSION"
            echo "  git push --force origin v$TAG_VERSION"
            exit 1
          fi

          echo "✅ 版本号一致: $PKG_VERSION"
          echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT

      - name: Build macOS
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version info
        id: version
        run: |
          # 使用验证过的版本号，确保一致性
          VERSION=${{ steps.verify-version.outputs.version }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using verified version: $VERSION"

      - name: Calculate SHA256
        id: sha256
        run: |
          ARM64_SHA=$(shasum -a 256 dist/Yes-Sessions-*-arm64.dmg | cut -d' ' -f1)
          echo "arm64=$ARM64_SHA" >> $GITHUB_OUTPUT
          echo "ARM64 SHA256: $ARM64_SHA"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/Yes-Sessions-*-arm64.dmg
          body: |
            ## 安装指南

            ### macOS (Apple Silicon)

            1. 下载 `Yes-Sessions-${{ steps.version.outputs.version }}-arm64.dmg`
            2. 打开终端，移除安全隔离属性：
               ```bash
               xattr -c ~/Downloads/Yes-Sessions-${{ steps.version.outputs.version }}-arm64.dmg
               ```
            3. 双击 DMG 安装

            ---

            ## 新版本特性

            ### 新增功能

            - Toast 通知系统：所有设置变更都有视觉反馈
            - Thinking 内容开关：可选择在会话详情中显示/隐藏 AI 思考过程
            - 默认应用选择：设置启动时默认展示的 AI 应用
            - 界面优化：设置页面布局改进，颜色选择器更简洁

            ### 改进

            - 优化 Toast 样式，支持多种级别（成功/信息/警告/错误）
            - 默认应用列表显示不支持的应用并标记"即将推出"
            - 国际化支持增强

            ---

            ## 系统要求

            - **macOS**: macOS 11.0 (Big Sur) 或更高版本（Apple Silicon）

            ---

            ## 关于 macOS "文件已损坏" 提示

            由于应用未经过 Apple 官方签名，macOS 会显示"文件已损坏"。这是因为：

            1. 从网络下载的文件会被 macOS 标记为 `com.apple.quarantine`
            2. 未签名的应用会被 Gatekeeper 拦截

            **解决方法**：安装前运行 `xattr -c` 命令移除安全标记（详见上方安装说明）

            **长期方案**: 考虑申请 Apple Developer 账号进行官方签名

            ---

            ## 文件校验

            | 文件名                                                      | SHA256                              |
            | ----------------------------------------------------------- | ----------------------------------- |
            | Yes-Sessions-${{ steps.version.outputs.version }}-arm64.dmg | `${{ steps.sha256.outputs.arm64 }}` |

            ---

            ## 已知问题

            - macOS 首次安装需要移除 quarantine 属性（见安装说明）
            - 深色/浅色主题切换需要重启应用才能完全生效

            ---

            ## 相关链接

            - 完整文档: https://github.com/KrabsWong/agent-manager#readme
            - 问题反馈: https://github.com/KrabsWong/agent-manager/issues
            - 功能建议: https://github.com/KrabsWong/agent-manager/discussions
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release in homebrew-yes-sessions (public)
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${{ steps.verify-version.outputs.version }}
          DMG_FILE=$(ls dist/Yes-Sessions-*-arm64.dmg)

          # 在 homebrew-yes-sessions 仓库创建 release 并上传 DMG
          # 使用公开仓库托管构建产物，确保 Homebrew 可以无认证下载
          gh release create "v${VERSION}" "$DMG_FILE" \
            --repo KrabsWong/homebrew-yes-sessions \
            --title "v${VERSION}" \
            --notes "Yes Sessions v${VERSION}" \
            --latest

      - name: Update Homebrew Cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${{ steps.verify-version.outputs.version }}
          SHA256=${{ steps.sha256.outputs.arm64 }}

          # 配置 git
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # 克隆 Tap 仓库
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/KrabsWong/homebrew-yes-sessions.git
          cd homebrew-yes-sessions

          # 用 sed 替换版本号和 SHA256
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/yes-sessions.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/yes-sessions.rb
          sed -i "s|releases/download/v[^/]*/|releases/download/v${VERSION}/|" Casks/yes-sessions.rb

          git add .
          git commit -m "Update yes-sessions to ${VERSION}"
          git push

          echo "✅ Homebrew Cask updated to version ${VERSION}"
