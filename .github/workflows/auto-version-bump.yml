name: Auto Version Bump

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  bump-version:
    # 只在 PR 被合并时触发
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check for WORKFLOW_PAT
        id: check-pat
        run: |
          if [ -n "${{ secrets.WORKFLOW_PAT }}" ]; then
            echo "has_pat=true" >> $GITHUB_OUTPUT
            echo "✅ WORKFLOW_PAT 已配置"
          else
            echo "has_pat=false" >> $GITHUB_OUTPUT
            echo "⚠️ WORKFLOW_PAT 未配置"
          fi

      # 使用 PAT 进行 checkout，这样 git credential 会自动配置
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_PAT || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine version bump type
        id: bump-type
        run: |
          BUMP_TYPE="patch"
          PR_LABELS='${{ toJson(github.event.pull_request.labels) }}'
          echo "PR Labels: $PR_LABELS"

          if echo "$PR_LABELS" | grep -q '"name": "major"'; then
            BUMP_TYPE="major"
          elif echo "$PR_LABELS" | grep -q '"name": "minor"'; then
            BUMP_TYPE="minor"
          elif echo "$PR_LABELS" | grep -q '"name": "patch"'; then
            BUMP_TYPE="patch"
          fi

          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "Version bump type: $BUMP_TYPE"

      - name: Get current version
        id: current-version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate new version
        id: new-version
        run: |
          CURRENT_VERSION=${{ steps.current-version.outputs.current_version }}
          BUMP_TYPE=${{ steps.bump-type.outputs.bump_type }}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update version and create tag
        run: |
          NEW_VERSION=${{ steps.new-version.outputs.new_version }}

          # 配置 git（使用 checkout 已经配置好的 credential）
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # 更新 package.json 版本
          npm version $NEW_VERSION --no-git-tag-version

          # 提交版本变更
          git add package.json package-lock.json
          git commit -m "chore(release): bump version to ${NEW_VERSION} [skip ci]"

          # 推送到 main（使用 checkout 配置的 PAT）
          echo "正在推送到 main..."
          git push origin main

          # 创建 tag
          git tag "v${NEW_VERSION}"

          # 推送 tag（使用 checkout 配置的 PAT，应该能触发 Release workflow）
          echo "正在推送 tag v${NEW_VERSION}..."
          git push origin "v${NEW_VERSION}"

          echo "✅ Version bumped to ${NEW_VERSION}"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const newVersion = '${{ steps.new-version.outputs.new_version }}';
            const bumpType = '${{ steps.bump-type.outputs.bump_type }}';
            const hasPat = '${{ steps.check-pat.outputs.has_pat }}' === 'true';

            let body = `🎉 **版本已自动更新**\n\n`;
            body += `- 版本类型: **${bumpType}**\n`;
            body += `- 新版本: **v${newVersion}**\n`;
            body += `- Tag: [v${newVersion}](../../releases/tag/v${newVersion})\n\n`;

            if (hasPat) {
              body += `✅ 使用 WORKFLOW_PAT 推送，Release workflow 应该已自动触发。`;
            } else {
              body += `⚠️ **注意**：未配置 WORKFLOW_PAT，Release workflow 不会自动触发。`;
            }

            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } catch (error) {
              console.log('⚠️ 添加评论失败:', error.message);
            }
