name: Auto Version Bump

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  bump-version:
    # 只在 PR 被合并时触发
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # 需要获取完整历史和所有标签
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine version bump type
        id: bump-type
        run: |
          # 获取 PR 的标签来决定版本升级类型
          # 默认 patch（bugfix）
          BUMP_TYPE="patch"

          # 检查 PR 标签
          PR_LABELS='${{ toJson(github.event.pull_request.labels) }}'
          echo "PR Labels: $PR_LABELS"

          if echo "$PR_LABELS" | grep -q '"name": "major"'; then
            BUMP_TYPE="major"
          elif echo "$PR_LABELS" | grep -q '"name": "minor"'; then
            BUMP_TYPE="minor"
          elif echo "$PR_LABELS" | grep -q '"name": "patch"'; then
            BUMP_TYPE="patch"
          fi

          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "Version bump type: $BUMP_TYPE"

      - name: Get current version
        id: current-version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate new version
        id: new-version
        run: |
          CURRENT_VERSION=${{ steps.current-version.outputs.current_version }}
          BUMP_TYPE=${{ steps.bump-type.outputs.bump_type }}

          # 解析版本号
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          # 根据类型递增版本
          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update version and create tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION=${{ steps.new-version.outputs.new_version }}

          # 配置 git
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # 更新 package.json 版本
          npm version $NEW_VERSION --no-git-tag-version

          # 提交版本变更
          git add package.json package-lock.json
          git commit -m "chore(release): bump version to ${NEW_VERSION} [skip ci]"

          # 推送到 main
          git push origin main

          # 创建 tag
          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"

          echo "✅ Version bumped to ${NEW_VERSION} and tag v${NEW_VERSION} created"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const newVersion = '${{ steps.new-version.outputs.new_version }}';
            const bumpType = '${{ steps.bump-type.outputs.bump_type }}';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🎉 **版本已自动更新**\n\n- 版本类型: **${bumpType}**\n- 新版本: **v${newVersion}**\n- Tag: [v${newVersion}](../../releases/tag/v${newVersion})\n\nRelease 构建将在几分钟后完成。`
            });
