name: Auto Version Bump

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  bump-version:
    # 只在 PR 被合并时触发，且没有 skip-release 标签
    if: |
      github.event.pull_request.merged == true &&
      !contains(github.event.pull_request.labels.*.name, 'skip-release')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Determine version bump type
        id: bump-type
        run: |
          BUMP_TYPE="patch"
          PR_LABELS='${{ toJson(github.event.pull_request.labels) }}'
          echo "PR Labels: $PR_LABELS"

          if echo "$PR_LABELS" | grep -q '"name": "major"'; then
            BUMP_TYPE="major"
          elif echo "$PR_LABELS" | grep -q '"name": "minor"'; then
            BUMP_TYPE="minor"
          elif echo "$PR_LABELS" | grep -q '"name": "patch"'; then
            BUMP_TYPE="patch"
          fi

          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "Version bump type: $BUMP_TYPE"

      - name: Get current version
        id: current-version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate new version
        id: new-version
        run: |
          CURRENT_VERSION=${{ steps.current-version.outputs.current_version }}
          BUMP_TYPE=${{ steps.bump-type.outputs.bump_type }}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update version and create tag
        env:
          WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
        run: |
          NEW_VERSION=${{ steps.new-version.outputs.new_version }}

          # 配置 git
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # 更新 package.json 版本
          npm version $NEW_VERSION --no-git-tag-version

          # 提交版本变更
          git add package.json package-lock.json
          git commit -m "chore(release): bump version to ${NEW_VERSION} [skip ci]"

          # 使用 PAT 显式设置 remote URL，确保推送能触发后续 workflow
          # GITHUB_TOKEN 推送的事件不会触发其他 workflow（GitHub 安全限制）
          # 必须使用 PAT 才能触发 release.yml
          if [ -n "$WORKFLOW_PAT" ]; then
            git remote set-url origin "https://x-access-token:${WORKFLOW_PAT}@github.com/${{ github.repository }}.git"
            echo "✅ 使用 WORKFLOW_PAT 推送"
          else
            echo "⚠️ WORKFLOW_PAT 未配置，使用 GITHUB_TOKEN 推送（Release workflow 将不会自动触发）"
          fi

          # 推送到 main
          echo "正在推送到 main..."
          git push origin main

          # 创建 tag
          git tag "v${NEW_VERSION}"

          # 推送 tag
          echo "正在推送 tag v${NEW_VERSION}..."
          git push origin "v${NEW_VERSION}"

          echo "✅ Version bumped to ${NEW_VERSION}"

      - name: Trigger Release workflow
        uses: actions/github-script@v9
        env:
          WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
        with:
          github-token: ${{ secrets.WORKFLOW_PAT }}
          script: |
            const newVersion = '${{ steps.new-version.outputs.new_version }}';
            const bumpType = '${{ steps.bump-type.outputs.bump_type }}';
            const pr = context.payload.pull_request;

            if (!process.env.WORKFLOW_PAT) {
              core.setFailed('WORKFLOW_PAT 未配置，无法可靠触发 release workflow');
              return;
            }

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: 'main',
              inputs: {
                tag: `v${newVersion}`,
                source_pr_number: String(pr.number),
                source_pr_title: pr.title,
                source_pr_url: pr.html_url,
                source_pr_author: pr.user?.login || '',
                source_pr_merge_commit: pr.merge_commit_sha || '',
                source_bump_type: bumpType,
              },
            });

            core.info(`✅ Release workflow 已触发 (v${newVersion})`);

      - name: Comment on PR
        uses: actions/github-script@v9
        with:
          script: |
            const newVersion = '${{ steps.new-version.outputs.new_version }}';
            const bumpType = '${{ steps.bump-type.outputs.bump_type }}';
            const prUrl = context.payload.pull_request.html_url;

            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🎉 **版本已自动更新**\n\n- 版本类型: **${bumpType}**\n- 新版本: **v${newVersion}**\n- 来源 PR: ${prUrl}\n- Tag: [v${newVersion}](../../releases/tag/v${newVersion})\n\nRelease 构建将在几分钟后完成，Release notes 会包含本 PR 的标题、链接和版本对比链接。`
              });
            } catch (error) {
              console.log('⚠️ 添加评论失败:', error.message);
            }
