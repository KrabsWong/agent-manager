name: Build and Release Neutralino App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 9.0.0)'
        required: false

env:
  NODE_VERSION: '20'
  RUST_VERSION: '1.75'

jobs:
  build-rust:
    name: Build Rust Service
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: yes-sessions-service
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: yes-sessions-service.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: yes-sessions-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Rust service
        run: |
          cd rust-service
          cargo build --release --target ${{ matrix.target }}

      - name: Upload Rust binary
        uses: actions/upload-artifact@v4
        with:
          name: rust-${{ matrix.os }}
          path: rust-service/target/${{ matrix.target }}/release/${{ matrix.binary }}

  build-neutralino:
    name: Build Neutralino App
    runs-on: ${{ matrix.os }}
    needs: build-rust
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: windows-latest
            platform: win
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Neutralino CLI
        run: npm install -g @neutralinojs/neu

      - name: Download Rust binary
        uses: actions/download-artifact@v4
        with:
          name: rust-${{ matrix.os }}
          path: rust-service/

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Build Neutralino bundle
        run: neu build --release

      - name: Create distribution package
        run: |
          mkdir -p dist-packages
          case "${{ matrix.platform }}" in
            mac)
              cd dist/yes-sessions-mac
              zip -r ../../dist-packages/yes-sessions-${{ matrix.platform }}-${{ matrix.arch }}.zip .
              ;;
            win)
              cd dist/yes-sessions-win
              7z a ../../dist-packages/yes-sessions-${{ matrix.platform }}-${{ matrix.arch }}.zip .
              ;;
            linux)
              cd dist/yes-sessions-linux
              tar -czf ../../dist-packages/yes-sessions-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz .
              ;;
          esac

      - name: Upload distribution package
        uses: actions/upload-artifact@v4
        with:
          name: yes-sessions-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist-packages/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-neutralino
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Yes Sessions v${{ env.VERSION }}
          body: |
            ## Yes Sessions v${{ env.VERSION }} - Neutralino Edition
            
            ### 🎉 Major Changes
            
            - Migrated from Electron to Neutralinojs + Rust architecture
            - Package size reduced by **95%** (150MB → 7MB)
            - Memory usage reduced by **83%** (200MB → 33MB)
            - Startup time improved by **65%** (390ms → 135ms)
            - Zero Node.js native module dependencies
            
            ### 📦 Downloads
            
            | Platform | Architecture | Package |
            |----------|-------------|---------|
            | macOS | ARM64 (M1/M2) | `yes-sessions-mac-arm64.zip` |
            | Windows | x64 | `yes-sessions-win-x64.zip` |
            | Linux | x64 | `yes-sessions-linux-x64.tar.gz` |
            
            ### 🔧 Technical Details
            
            - **Frontend**: React 18 + TypeScript + Vite
            - **Backend**: Rust microservice (Actix-web + rusqlite + portable-pty)
            - **Desktop**: Neutralinojs (lightweight WebView wrapper)
            
            See [Migration Guide](./docs/MIGRATION-GUIDE.md) for details.
          files: |
            artifacts/*/yes-sessions-*.zip
            artifacts/*/yes-sessions-*.tar.gz
          draft: false
          prerelease: false

  test:
    name: Test Application
    runs-on: macos-latest
    needs: build-neutralino

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: yes-sessions-mac-arm64
          path: test-app/

      - name: Extract and run application
        run: |
          cd test-app
          unzip yes-sessions-mac-arm64.zip
          
          # Start application
          open yes-sessions-mac-arm64/yes-sessions.app
          
          # Wait for app to start
          sleep 5
          
          # Test API health
          curl -f http://localhost:3000/health || exit 1
          
          # Test sessions API
          curl -f http://localhost:3000/api/sessions/opencode || exit 1

      - name: Cleanup
        if: always()
        run: |
          pkill -f yes-sessions || true