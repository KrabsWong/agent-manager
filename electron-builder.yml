appId: com.yessessions.app
productName: Yes-Sessions
copyright: Copyright © 2026 Yes Sessions
asar: true
directories:
  output: release
  buildResources: build
files:
  - 'dist/**/*'
  - 'dist-electron/**/*'
  - 'package.json'
  - '!**/*.map'
  - '!node_modules'
  - '!node_modules/**/*'
extraResources:
  - from: node_modules/better-sqlite3
    to: node_modules/better-sqlite3
    filter:
      - '**/*'
      - '!**/*.map'
      - '!**/*.ts'
      - '!**/test/**/*'
      - '!**/tests/**/*'
      - '!**/docs/**/*'
      - '!**/*.md'
      - '!**/binding.gyp'
      - '!**/build/Makefile'
      - '!**/build/*.mk'
  - from: node_modules/keytar
    to: node_modules/keytar
    filter:
      - '**/*'
      - '!**/*.map'
      - '!**/*.ts'
      - '!**/test/**/*'
      - '!**/tests/**/*'
      - '!**/docs/**/*'
      - '!**/*.md'
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  icon: build/icon.icns
win:
  target:
    - nsis
    - portable
  icon: build/icon.ico
linux:
  target:
    - AppImage
    - deb
    - rpm
  category: Development
  icon: build/icons
publish:
  provider: github
  owner: yes-sessions
  repo: yes-sessions-electron
  releaseType: release
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
